services:
  postgres:
    image: postgres:16-alpine
    container_name: stm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD é obrigatório}
      POSTGRES_DB: ${POSTGRES_DB:-stm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: stm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-stm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stm}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET é obrigatório}
      VAULT_ENCRYPTION_KEY: ${VAULT_ENCRYPTION_KEY:?VAULT_ENCRYPTION_KEY é obrigatório}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@stmarche.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      UPLOAD_DIR: /uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: stm-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
